<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Smart ID Kiosk — System Architecture</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0e10;
    color: #e2e0d8;
    font-family: 'DM Mono', 'Fira Mono', 'Courier New', monospace;
    min-height: 100vh;
    padding: 24px 16px 40px;
  }

  h1 {
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #7c7a72;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 11px;
    color: #4a4843;
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  .diagram-wrap {
    width: 100%;
    overflow-x: auto;
    border: 1px solid #1e1e22;
    border-radius: 12px;
    background: #0a0a0c;
    padding: 8px;
  }

  svg .comp {
    cursor: pointer;
    transition: opacity 0.15s;
  }
  svg .comp:hover { opacity: 0.75; }
  svg .comp.active rect,
  svg .comp.active ellipse { stroke-width: 1.5 !important; }

  /* ── Info panel ──────────────────────────────── */
  #panel {
    margin-top: 14px;
    background: #131316;
    border: 1px solid #252528;
    border-radius: 12px;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.38s cubic-bezier(.4,0,.2,1), opacity 0.28s ease, padding 0.28s ease;
  }
  #panel.open {
    max-height: 600px;
    opacity: 1;
    padding: 20px 22px 22px;
  }

  .pn-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 12px;
  }
  .pn-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .pn-title {
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    font-size: 17px;
    font-weight: 600;
    color: #f0ede6;
    line-height: 1.2;
  }
  .pn-sub {
    font-size: 11px;
    color: #6a6860;
    margin-top: 3px;
    font-family: 'DM Mono', monospace;
  }
  .pn-close {
    background: none;
    border: 1px solid #2e2e32;
    border-radius: 6px;
    color: #5a5852;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 14px;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .pn-close:hover { border-color: #4a4843; color: #b0ae a8; }

  .pn-body {
    font-size: 12.5px;
    color: #8a8880;
    line-height: 1.7;
    margin-bottom: 16px;
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    border-left: 2px solid #252528;
    padding-left: 12px;
  }

  .pn-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 8px;
  }
  .pn-row {
    background: #0e0e10;
    border: 1px solid #1e1e22;
    border-radius: 8px;
    padding: 9px 12px;
  }
  .pn-key {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #4a4843;
    margin-bottom: 3px;
  }
  .pn-val {
    font-size: 11.5px;
    color: #c0beb6;
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    line-height: 1.4;
  }

  .hint {
    font-size: 10px;
    color: #3a3832;
    margin-top: 10px;
    text-align: center;
    letter-spacing: 0.06em;
  }
</style>
</head>

let active = null;

function show(id) {
  const d = DATA[id];
  if (!d) return;

  if (active) {
    const prev = document.getElementById('c-' + active.replace('-','_').replace(/-/g,''));
    // clear all active
    document.querySelectorAll('.comp').forEach(el => el.classList.remove('active'));
  }

  // mark active
  const compMap = {
    'mock-db':'c-mock-db','sms-gateway':'c-sms-gw','rpi':'c-rpi',
    'touchscreen':'c-touch','csi-camera':'c-csi','usb-camera':'c-usb',
    'kivy-ui':'c-kivy','ocr':'c-ocr','auth':'c-auth','sqlite':'c-sqlite',
    'uni-api':'c-api','sms-client':'c-smsc','spi':'c-spi','stm32':'c-stm32',
    'motor-drivers':'c-drivers','sensors':'c-sensors','stepper':'c-stepper',
    'servos':'c-servos','solenoid':'c-solenoid','carousel':'c-carousel',
    'psu':'c-psu','battery':'c-battery'
  };
  const el = document.getElementById(compMap[id]);
  if (el) el.classList.add('active');
  active = id;

  const rows = d.rows.map(([k,v]) => `
    <div class="pn-row">
      <div class="pn-key">${k}</div>
      <div class="pn-val">${v}</div>
    </div>`).join('');

  const panel = document.getElementById('panel');
  panel.innerHTML = `
    <div class="pn-head">
      <div>
        <div class="pn-label" style="color:${d.color}">${d.label}</div>
        <div class="pn-title">${d.title}</div>
        <div class="pn-sub">${d.sub}</div>
      </div>
      <button class="pn-close" onclick="closePanel()">✕</button>
    </div>
    <p class="pn-body">${d.body}</p>
    <div class="pn-grid">${rows}</div>
  `;

  if (!panel.classList.contains('open')) {
    panel.classList.add('open');
  }

  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
